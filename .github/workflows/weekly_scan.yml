name: CODOS Observatory Weekly Scan

on:
  schedule:
    - cron: "0 0 * * 0"   # Every Sunday 00:00 UTC — weekly assurance sweep
  workflow_dispatch:        # Manual trigger for testing

permissions:
  contents: write           # Needed to commit updated JSON files back

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Ensure data directory exists
        run: mkdir -p data

      - name: Run CODOS Observatory scan
        env:
          EXA_API_KEY: ${{ secrets.EXA_API_KEY }}
          FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python main.py

      - name: Commit updated snapshot
        run: |
          git config user.name  "CODOS Observatory Bot"
          git config user.email "observatory-bot@users.noreply.github.com"
          git add -A data/   # snapshot + insights/scan history + discovered-competitors ledger
          git diff --cached --quiet || git commit -m "chore: weekly scan $(date -u '+%Y-%m-%d')"
          git push

      # Optional: deploy refreshed data to your own server over rsync/SSH.
      # Skipped automatically unless the VPS_HOST repo variable is set.
      # Configure: Variables VPS_HOST (e.g. user@1.2.3.4) + VPS_PATH, and Secret VPS_SSH_KEY.
      - name: Deploy data to server
        if: ${{ vars.VPS_HOST != '' }}
        env:
          VPS_HOST: ${{ vars.VPS_HOST }}
          VPS_PATH: ${{ vars.VPS_PATH }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${VPS_HOST##*@}" >> ~/.ssh/known_hosts 2>/dev/null
          rsync -avz -e "ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no" \
            data/ "${VPS_HOST}:${VPS_PATH}"
